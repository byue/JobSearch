name: CI Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: make build
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt
            src/scrapers/airflow/requirements.txt
            src/scrapers/proxy/requirements.txt
            src/web/backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/web/frontend/package-lock.json

      - name: Docker info
        run: |
          docker version
          docker compose version

      - name: Run build
        run: make build
