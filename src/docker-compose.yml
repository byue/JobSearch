services:
  redis:
    image: redis:latest
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data_latest:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:9.3.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  kibana:
    image: kibana:9.3.1
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:5601/api/status >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  kibana-bootstrap:
    image: curlimages/curl:latest
    depends_on:
      kibana:
        condition: service_healthy
    restart: "no"
    volumes:
      - ..:/opt/jobsearch
    environment:
      KIBANA_URL: http://kibana:5601
      KIBANA_DATA_VIEW_ID: jobsearch-jobs-catalog
      KIBANA_DATA_VIEW_NAME: Jobs Catalog
      KIBANA_DATA_VIEW_TITLE: jobs_catalog*
    entrypoint: ["/bin/sh", "/opt/jobsearch/src/scripts/bootstrap_kibana.sh"]

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/jobsearch-xcom
      "

  scraper-db-init:
    image: postgres:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: airflow
    volumes:
      - ..:/opt/jobsearch
    command: >
      bash -c "
      psql
      -h postgres
      -U airflow
      -d airflow
      -v ON_ERROR_STOP=1
      -f /opt/jobsearch/src/sql/init.sql
      "

  airflow-init:
    build:
      context: ..
      dockerfile: src/scrapers/airflow/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      features:
        condition: service_healthy
      scraper-db-init:
        condition: service_completed_successfully
    env_file:
      - ./scrapers/airflow/docker.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/jobsearch/src/scrapers/airflow/dags
      PYTHONPATH: /opt/jobsearch/src
    volumes:
      - ..:/opt/jobsearch
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    user: "${AIRFLOW_UID:-50000}:0"
    command: >
      bash -c "
      airflow db migrate
      "

  airflow-webserver:
    build:
      context: ..
      dockerfile: src/scrapers/airflow/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      features:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      scraper-db-init:
        condition: service_completed_successfully
    env_file:
      - ./scrapers/airflow/docker.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/jobsearch/src/scrapers/airflow/dags
      PYTHONPATH: /opt/jobsearch/src
    volumes:
      - ..:/opt/jobsearch
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    user: "${AIRFLOW_UID:-50000}:0"
    command: api-server
    ports:
      - "8080:8080"

  airflow-scheduler:
    build:
      context: ..
      dockerfile: src/scrapers/airflow/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      features:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      scraper-db-init:
        condition: service_completed_successfully
    env_file:
      - ./scrapers/airflow/docker.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/jobsearch/src/scrapers/airflow/dags
      PYTHONPATH: /opt/jobsearch/src
    volumes:
      - ..:/opt/jobsearch
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler

  airflow-dag-processor:
    build:
      context: ..
      dockerfile: src/scrapers/airflow/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      features:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      scraper-db-init:
        condition: service_completed_successfully
    env_file:
      - ./scrapers/airflow/docker.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/jobsearch/src/scrapers/airflow/dags
      PYTHONPATH: /opt/jobsearch/src
    volumes:
      - ..:/opt/jobsearch
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    user: "${AIRFLOW_UID:-50000}:0"
    command: dag-processor

  proxy-producer:
    build:
      context: ..
      dockerfile: src/scrapers/proxy/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./scrapers/airflow/docker.env
    environment:
      PYTHONPATH: /opt/jobsearch/src
    volumes:
      - ..:/opt/jobsearch
    command: python /opt/jobsearch/src/scrapers/proxy/proxy_producer.py

  proxy-api:
    build:
      context: ..
      dockerfile: src/scrapers/proxy/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./scrapers/airflow/docker.env
    environment:
      PYTHONPATH: /opt/jobsearch/src
    volumes:
      - ..:/opt/jobsearch
    command: uvicorn scrapers.proxy.proxy_api:app --host 0.0.0.0 --port 8090
    ports:
      - "8090:8090"

  backend:
    build:
      context: ..
      dockerfile: src/web/backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      features:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
      scraper-db-init:
        condition: service_completed_successfully
    environment:
      JOBSEARCH_DB_URL: postgresql+psycopg2://airflow:airflow@postgres/airflow
      JOBSEARCH_API_PAGE_SIZE: 25
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: jobsearch-xcom
      MINIO_SECURE: "false"
      JOBSEARCH_FEATURES_API_URL: http://features:8010
      JOBSEARCH_ES_URL: http://elasticsearch:9200
      JOBSEARCH_ES_ALIAS: jobs_catalog
      JOBSEARCH_ES_QUERY_CANDIDATES: 100
      JOBSEARCH_ES_KNN_CANDIDATES: 100
      JOBSEARCH_ES_KNN_NUM_CANDIDATES: 200
      JOBSEARCH_ES_RRF_K: 60
    ports:
      - "8000:8000"

  features:
    build:
      context: ..
      dockerfile: src/features/Dockerfile
    environment:
      JOBSEARCH_FEATURES_TECHNICAL_PATH: /opt/jobsearch/src/features/data/technical_skills.csv
      JOBSEARCH_FEATURES_KEYWORD_PATH: /opt/jobsearch/src/features/data/tech_keywords.csv
      JOBSEARCH_FEATURES_SPACY_MODEL: en_core_web_sm
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/openapi.json').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8010:8010"

  frontend:
    build:
      context: ..
      dockerfile: src/web/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  airflow_postgres_data_latest:
  airflow_logs:
  airflow_plugins:
  minio_data:
  elasticsearch_data:
